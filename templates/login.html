{% extends "base.html" %}
{% block title %}Login | GBME DevOps Hackathon{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon"><img src="{{ url_for('static', filename='img/image.png') }}" alt="Logo"></div>
            <h1><span class="brand-red">GBME</span> <span class="brand-white">Hackathon</span></h1>
            <p class="login-subtitle">From Code to Kubernetes — The Enterprise Way</p>
        </div>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Team Name</label>
                <select name="username" id="username" required>
                    <option value="" disabled selected>Select your team</option>
                    {% for team in teams %}
                    <option value="{{ team }}">{{ team | capitalize }}</option>
                    {% endfor %}
                    <option value="admin">🔑 Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter team password" required>
            </div>
            <button type="submit" class="login-btn">
                <span>Enter Hackathon</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </form>

        <div class="login-footer">
            <div class="login-stats">
                <div class="login-stat">
                    <span class="stat-num">6</span>
                    <span class="stat-lbl">Challenges</span>
                </div>
                <div class="login-stat">
                    <span class="stat-num">10</span>
                    <span class="stat-lbl">Teams</span>
                </div>
                <div class="login-stat">
                    <span class="stat-num">2h</span>
                    <span class="stat-lbl">Duration</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
